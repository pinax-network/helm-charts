name: Update README

on:
  push:
    branches:
      - gh-pages

jobs:
  update_readme:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Perl
      uses: shogo82148/actions-setup-perl@v1
      with:
        perl-version: '5.32'

    - name: Install dependencies
      run: cpanm YAML::Tiny

    - name: Update README.md
      run: |
        perl -e '
        use strict;
        use warnings;
        use YAML::Tiny;

        # Read the index.yaml file
        my $yaml = YAML::Tiny->read("index.yaml");

        # Get the entries
        my %entries = %{$yaml->[0]->{entries}};

        # Find the latest entry across all keys
        my ($latest_key, $latest_entry);
        foreach my $key (keys %entries) {
            my @sorted_entries = sort { $b->{version} cmp $a->{version} } @{$entries{$key}};
            my $entry = $sorted_entries[0];
            if (!defined $latest_entry || $entry->{version} gt $latest_entry->{version}) {
                $latest_key = $key;
                $latest_entry = $entry;
            }
        }

        # Extract the latest entry name, version, and URL
        my $latest_name = $latest_key;
        my $latest_version = $latest_entry->{version};
        my $latest_url = $latest_entry->{urls}[0];

        # Update the README.md file
        my $readme_file = "README.md";
        my $readme_content = read_file($readme_file);

        # Generate the new entry
        my $new_entry = "## Latest Release\n\n- Name: $latest_name\n- Version: $latest_version\n- URL: $latest_url\n";

        # Check if the "## Latest Release" section exists in the README
        if (index($readme_content, "## Latest Release") == -1) {
            # If the section doesn'"'"'t exist, append the new entry to the README
            $readme_content .= "\n$new_entry";
        } else {
            # If the section exists, find the position to insert the new entry
            my $insert_pos = index($readme_content, "## Latest Release");

            # Insert the new entry after the heading
            substr($readme_content, $insert_pos, 0) = "$new_entry\n";
        }

        # Write the updated content back to the file
        write_file($readme_file, $readme_content);

        # Set the flag to indicate changes were made
        print "::set-output name=changes_made::true\n";

        sub read_file {
            my ($file) = @_;
            open my $fh, "<", $file or die "Could not open file \"$file\": $!";
            local $/;
            my $content = <$fh>;
            close $fh;
            return $content;
        }

        sub write_file {
            my ($file, $content) = @_;
            open my $fh, ">", $file or die "Could not open file \"$file\": $!";
            print $fh $content;
            close $fh;
        }
        '
      id: update_readme

    - name: Commit changes
      if: steps.update_readme.outputs.changes_made == 'true'
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add README.md
        git commit -m "Update README.md with the latest release"

    - name: Push changes
      if: steps.update_readme.outputs.changes_made == 'true'
      uses: ad-m/github-push-action@master
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        branch: gh-pages
