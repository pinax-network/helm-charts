name: Update README with Helm Charts

on:
  push:
    branches:
      - gh-pages  # Change this to your default branch if different
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Install Yq
        run: sudo snap install yq
      - name: Generate Charts List
        id: generate-charts-list
        run: |
          echo '## Helm Charts' > CHARTS.md
          echo '' >> CHARTS.md
          yq e '.entries | keys | .[]' index.yaml -j | jq -r .[] | sort -u | while read chartName; do
            echo "- [$chartName](https://pinax-network.github.io/helm-charts/$chartName)" >> CHARTS.md
          done
      - name: Update README
        run: |
          sed -i '/## Helm Charts/,$d' README.md
          cat CHARTS.md >> README.md
      - name: Commit and Push Changes
        uses: EndBug/add-and-commit@v7
        with:
          message: 'Update README with latest Helm charts list'
          add: 'README.md'
          default_author: github_actions
