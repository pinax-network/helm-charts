name: Update README.md

on:
  push:
    branches:
      - gh-pages

jobs:

  update-readme:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
      with:
        ref: gh-pages

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PyYAML

    - name: Update README.md
      run: |
        import yaml

        # Load index.yaml
        with open("index.yaml", "r") as f:
            index = yaml.safe_load(f)

        # Generate README.md content
        readme_content = "# Helm Charts\n\n"
        included_charts = set()

        for chart_name, chart_versions in index["entries"].items():
            if chart_name not in included_charts:
                included_charts.add(chart_name)

                latest_version = max(chart_versions, key=lambda v: v["version"])

                readme_content += f"## {chart_name}\n\n"
                readme_content += f"### Version {latest_version['version']}\n"
                readme_content += f"{latest_version['description']}\n\n"
                readme_content += f"URL: {latest_version['urls'][0]}\n\n"

        # Write README.md
        with open("README.md", "w") as f:
            f.write(readme_content)

    - name: Commit changes
      run: |
        git config --global user.name 'GitHub Actions'
        git config --global user.email 'actions@github.com'
        git add README.md
        git commit -m "Update README.md" || echo "No changes to commit"
        git push origin gh-pages
