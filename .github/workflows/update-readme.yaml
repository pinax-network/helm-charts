name: Update README.md

on:
  push:
    branches:
      - gh-pages
#    paths:
#      - 'index.yaml'

jobs:

  update-readme:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
      with:
        ref: gh-pages

    - name: Install Helm
      run: |
        curl -fsSL -o get_helm.sh https://raw.githubusercontent.com/helm/helm/master/scripts/get-helm-3
        chmod +x get_helm.sh
        ./get_helm.sh

    - name: Install yq
      run: |
        sudo wget -O /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
        sudo chmod +x /usr/local/bin/yq

    - name: Update README.md
      run: |
        # Remove existing Helm Charts section from README.md
        sed -i '/# Helm Charts/,/^$/d' README.md

        charts=$(helm repo index --flat index.yaml --merge $GITHUB_WORKSPACE/index.yaml --yaml | yq '.entries[]?.name')
        echo "# Helm Charts" >> README.md
        echo "" >> README.md
        for chart in $charts; do
          version=$(helm repo index --flat index.yaml --merge $GITHUB_WORKSPACE/index.yaml --yaml | yq -r ".entries[]? | select(.name == \"$chart\") | .version")
          description=$(helm repo index --flat index.yaml --merge $GITHUB_WORKSPACE/index.yaml --yaml | yq -r ".entries[]? | select(.name == \"$chart\") | .description")
          echo "## $chart" >> README.md
          echo "" >> README.md
          echo "Version: $version" >> README.md
          echo "" >> README.md
          echo "$description" >> README.md
          echo "" >> README.md
        done

    - name: Commit changes
      run: |
        git config --global user.name 'GitHub Actions'
        git config --global user.email 'actions@github.com'
        git add README.md
        git commit -m "Update README.md" || echo "No changes to commit"
        git push origin gh-pages
