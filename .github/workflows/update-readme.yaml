name: Update README.md

on:
  push:
    branches:
      - gh-pages

jobs:

  update-readme:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
      with:
        ref: gh-pages

    - name: Install yq
      run: |
        sudo wget -O /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
        sudo chmod +x /usr/local/bin/yq

    - name: Update README.md
      run: |
        # Remove existing Helm Charts section from README.md
        sed -i '/# Helm Charts/,/^$/d' README.md

        # Get a list of all .tgz files
        tgz_files=$(ls *.tgz)

        echo "# Helm Charts" >> README.md
        echo "" >> README.md

        for tgz_file in $tgz_files; do
          chart_name=$(echo "$tgz_file" | sed 's/\(.*\)-\([^-]*\)\.tgz/\1/')
          chart_version=$(echo "$tgz_file" | sed 's/\(.*\)-\([^-]*\)\.tgz/\2/')
          chart_description=$(yq r "$tgz_file" 'description')

          echo "## $chart_name" >> README.md
          echo "" >> README.md
          echo "Version: $chart_version" >> README.md
          echo "" >> README.md
          echo "$chart_description" >> README.md
          echo "" >> README.md
        done

    - name: Commit changes
      run: |
        git config --global user.name 'GitHub Actions'
        git config --global user.email 'actions@github.com'
        git add README.md
        git commit -m "Update README.md" || echo "No changes to commit"
        git push origin gh-pages
