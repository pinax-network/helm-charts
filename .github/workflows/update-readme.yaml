name: Update README with Helm Chart Information

on:
  push:
    branches:
      - main  # Adjust this to your branch as needed

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install yq (Version 4)
        run: |
          sudo wget -O /usr/bin/yq https://github.com/mikefarah/yq/releases/download/v4.27.5/yq_linux_amd64
          sudo chmod +x /usr/bin/yq

      - name: Update README.md with Helm Charts
        run: |
          # Remove existing Helm Charts section from README.md
          sed -i '/# Helm Charts/,/^$/d' README.md

          # Write new Helm Charts section
          echo "# Helm Charts" >> README.md
          echo "" >> README.md

          # Extract and append chart information to README.md
          yq e '.entries[] | keys[] as $k | .[$k][] | "## \(.name)\n\n### Version \(.version)\n\(.description)\n"' index.yaml >> README.md

      - name: Commit and Push Changes
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add README.md
          git commit -m "Update README with Helm Charts information" -a || echo "No changes to commit"
          git push
