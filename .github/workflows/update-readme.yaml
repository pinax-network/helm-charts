name: Update README.md

on:
  push:
    branches:
      - gh-pages

jobs:

  update-readme:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
      with:
        ref: gh-pages

    - name: Update README.md
      run: |
        # Remove existing Helm Charts section from README.md
        sed -i '/# Helm Charts/,/^$/d' README.md

        # Write new Helm Charts section
        echo "# Helm Charts" >> README.md
        echo "" >> README.md

        current_chart=""
        while IFS= read -r line; do
          if [[ $line == *"name:"* ]]; then
            current_chart=$(echo "$line" | sed -e 's/^.*name: //')
            echo "## $current_chart" >> README.md
            echo "" >> README.md
          elif [[ $line == *"version:"* ]]; then
            version=$(echo "$line" | sed -e 's/^.*version: //')
            echo "### Version $version" >> README.md
          elif [[ $line == *"description:"* ]]; then
            description=$(echo "$line" | sed -e 's/^.*description: //')
            echo "$description" >> README.md
            echo "" >> README.md
          fi
        done < index.yaml

    - name: Commit changes
      run: |
        git config --global user.name 'GitHub Actions'
        git config --global user.email 'actions@github.com'
        git add README.md
        git commit -m "Update README.md" || echo "No changes to commit"
        git push origin gh-pages
