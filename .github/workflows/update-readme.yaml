name: Update README.md

on:
  push:
    branches:
      - gh-pages

jobs:

  update-readme:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
      with:
        ref: gh-pages

    - name: Update README.md
      run: |
        # Remove existing Helm Charts section from README.md
        sed -i '/# Helm Charts/,/^$/d' README.md

        # Write new Helm Charts section
        echo "# Helm Charts" >> README.md
        echo "" >> README.md

        while IFS= read -r line; do
          if [[ $line == "  - apiVersion: v2"* ]]; then
            chart_name=$(echo "$line" | awk -F'name: ' '{print $2}')
            version=$(echo "$line" | awk -F'version: ' '{print $2}')
            description=$(echo "$line" | awk -F'description: ' '{print $2}')

            echo "## $chart_name" >> README.md
            echo "" >> README.md
            echo "### Version $version" >> README.md
            echo "$description" >> README.md
            echo "" >> README.md
          fi
        done < index.yaml

    - name: Commit changes
      run: |
        git config --global user.name 'GitHub Actions'
        git config --global user.email 'actions@github.com'
        git add README.md
        git commit -m "Update README.md" || echo "No changes to commit"
        git push origin gh-pages
