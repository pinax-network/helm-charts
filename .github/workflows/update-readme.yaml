name: Update README.md

on:
  push:
    branches:
      - gh-pages
    paths:
      - 'index.yaml'

jobs:

  update-readme:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
      with:
        ref: gh-pages

    - name: Install Helm
      run: |
        curl -fsSL -o get_helm.sh https://raw.githubusercontent.com/helm/helm/master/scripts/get-helm-3
        chmod +x get_helm.sh
        ./get_helm.sh

    - name: Update README.md
      run: |
        charts=$(helm repo index --flat index.yaml | grep -v 'README.md' | awk '{print $2}')
        echo "# Helm Charts" > README.md
        echo "" >> README.md
        for chart in $charts; do
          version=$(helm repo index --flat index.yaml | grep $chart | awk '{print $3}')
          description=$(helm repo index --flat index.yaml | grep $chart | awk '{print $4}')
          echo "## $chart" >> README.md
          echo "" >> README.md
          echo "Version: $version" >> README.md
          echo "" >> README.md
          echo "$description" >> README.md
          echo "" >> README.md
        done

    - name: Commit changes
      run: |
        git config --global user.name 'GitHub Actions'
        git config --global user.email 'actions@github.com'
        git add README.md
        git commit -m "Update README.md" || echo "No changes to commit"
        git push origin gh-pages
