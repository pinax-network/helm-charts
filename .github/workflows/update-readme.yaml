name: Update README with Helm Charts

on:
  push:
    branches:
      - gh-pages  # Change this to your default branch if different
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Install Yq
        run: |
          sudo wget -O /usr/bin/yq https://github.com/mikefarah/yq/releases/download/v4.6.1/yq_linux_amd64
          sudo chmod +x /usr/bin/yq
      - name: Update README with Helm Charts
        run: |
          # Remove existing Helm Charts section
          sed -i '/## Helm Charts/,$d' README.md
          
          # Add Helm Charts header
          echo '## Helm Charts' >> README.md
          echo '' >> README.md
          
          # Generate and append the list of charts
          yq e '.entries | keys | .[]' index.yaml -j | jq -r .[] | sort -u | while read chartName; do
            echo "- [$chartName](https://pinax-network.github.io/helm-charts/$chartName)" >> README.md
          done
      - name: Commit and Push Changes
        uses: EndBug/add-and-commit@v7
        with:
          message: 'Update README with latest Helm charts list'
          add: 'README.md'
          default_author: github_actions
