name: Update README.md

on:
  push:
    branches:
      - gh-pages

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
      with:
        ref: gh-pages

    - name: Install yq
      run: |
        sudo wget -O /usr/bin/yq https://github.com/mikefarah/yq/releases/download/v4.27.5/yq_linux_amd64
        sudo chmod +x /usr/bin/yq

    - name: Update README.md
      run: |
        # Remove existing Helm Charts section from README.md
        sed -i '/# Helm Charts/,/^$/d' README.md

        # Write new Helm Charts section
        echo "# Helm Charts" >> README.md
        echo "" >> README.md

        yq e '.entries | to_entries[] | .key as $key | .value[] | select(.apiVersion == "v2")' index.yaml -j | \
        jq -r '"## " + .name, "", "### Version " + .version, .description, ""' >> README.md

    - name: Commit changes
      run: |
        git config --global user.name 'GitHub Actions'
        git config --global user.email 'actions@github.com'
        git add README.md
        git commit -m "Update README.md" -a || echo "No changes to commit"
        git push origin gh-pages
