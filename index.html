<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Helm Charts</title>
</head>
<body>
    <h1>Helm Charts</h1>
    <ul>
        <!-- List all files and directories in the "charts" directory -->
        <script>
            var charts = [
                {% for file in site.static_files %}
                    {% if file.path contains 'charts/' %}
                        "{{ file.basename }}",
                    {% endif %}
                {% endfor %}
            ];
            charts.forEach(function(chart) {
                document.write('<li><a href="charts/' + chart + '">' + chart + '</a></li>');
            });
        </script>
    </ul>
</body>
</html>
